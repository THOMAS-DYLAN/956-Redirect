<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>956 Labs — We've Moved</title>
  <meta http-equiv="refresh" content="5;url=https://956labs.ctxlabz.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #006847;
      --red:   #CE1126;
      --white: #F4F4EF;
      --dark:  #0E0E0E;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Diagonal stripe pattern — RGV energy */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 32px,
        rgba(0,104,71,.05) 32px,
        rgba(0,104,71,.05) 33px
      );
      pointer-events: none;
    }

    /* Corner flag accent */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 120px 120px 0 0;
      border-color: var(--green) transparent transparent transparent;
      opacity: .18;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Top bar — Mexican flag colors */
    .accent-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      display: flex;
    }
    .accent-bar span {
      flex: 1;
    }
    .accent-bar span:nth-child(1) { background: var(--green); }
    .accent-bar span:nth-child(2) { background: #ffffff22; }
    .accent-bar span:nth-child(3) { background: var(--red); }

    .badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid rgba(0,104,71,.4);
      padding: .3rem .9rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .5s ease forwards .05s;
    }

    .logo-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: .08em;
      line-height: 1;
      color: var(--white);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .6s ease forwards .15s;
    }

    .logo-mark span { color: var(--red); }

    .rgv-tag {
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(244,244,239,.35);
      margin-top: .4rem;
      opacity: 0;
      animation: fadeUp .5s ease forwards .25s;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.6rem auto;
      opacity: 0;
      animation: fadeUp .5s ease forwards .3s;
    }
    .divider-line {
      width: 32px; height: 1px;
      background: rgba(244,244,239,.2);
    }
    .divider-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: .1em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp .5s ease forwards .35s;
    }

    .sub {
      margin-top: .65rem;
      font-size: .92rem;
      color: rgba(244,244,239,.45);
      letter-spacing: .02em;
      line-height: 1.65;
      max-width: 340px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .43s;
    }

    .new-url {
      display: inline-block;
      margin-top: 2rem;
      padding: .9rem 2.4rem;
      background: transparent;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: .14em;
      text-decoration: none;
      border: 1px solid rgba(244,244,239,.25);
      border-radius: 2px;
      transition: background .2s, border-color .2s, transform .2s;
      opacity: 0;
      animation: fadeUp .5s ease forwards .52s;
    }
    .new-url:hover {
      background: rgba(244,244,239,.06);
      border-color: var(--green);
      transform: translateY(-2px);
    }

    /* Countdown */
    .countdown-wrap {
      position: relative;
      margin-top: 2.5rem;
      width: 60px; height: 60px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .62s;
    }
    .countdown-svg {
      transform: rotate(-90deg);
      width: 60px; height: 60px;
    }
    .countdown-track {
      fill: none;
      stroke: rgba(255,255,255,.07);
      stroke-width: 2;
    }
    .countdown-ring {
      fill: none;
      stroke: var(--red);
      stroke-width: 2;
      stroke-dasharray: 150;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      animation: countdown 5s linear forwards .1s;
    }
    @keyframes countdown {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 150; }
    }
    .countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--white);
    }

    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: .7rem;
      color: rgba(244,244,239,.2);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="accent-bar">
    <span></span><span></span><span></span>
  </div>

  <div class="wrap">
    <div class="badge">Rio Grande Valley</div>
    <div class="logo-mark">956 <span>Labs</span></div>
    <div class="rgv-tag">McAllen · Edinburg · Harlingen · Brownsville</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="headline">We've Moved</div>
    <p class="sub">956 Labs has a new home. You'll be redirected automatically in a few seconds.</p>

    <a class="new-url" href="https://956labs.ctxlabz.com">Go to 956labs.CTXLabz.com →</a>

    <div class="countdown-wrap">
      <svg class="countdown-svg" viewBox="0 0 52 52">
        <circle class="countdown-track" cx="26" cy="26" r="24"/>
        <circle class="countdown-ring"  cx="26" cy="26" r="24"/>
      </svg>
      <div class="countdown-num" id="num">5</div>
    </div>
  </div>

  <div class="footer-note">956 Labs · Research Peptides · For Research Purposes Only</div>

  <script>
    let t = 5;
    const num = document.getElementById('num');
    const iv = setInterval(() => {
      t--;
      num.textContent = t;
      if (t <= 0) { clearInterval(iv); location.replace('https://956labs.ctxlabz.com'); }
    }, 1000);
  </script>
</body>
</html>
